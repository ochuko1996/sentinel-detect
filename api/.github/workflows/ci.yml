name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      # Hermetic, no-ML-backend install — mirrors the default local dev
      # setup (`uv sync --extra dev`). The optional `vision` extra
      # (ultralytics/torch) is deliberately not installed here: it adds
      # multiple GB and its own live-inference test
      # (test_detect_image_live.py) auto-skips via `pytest.importorskip`
      # when it isn't present, so CI stays fast without losing coverage of
      # anything that doesn't require real ML inference.
      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Test (pytest, hermetic — no network, no ML backend)
        run: uv run pytest --cov=src/sentinel_detect --cov-report=term-missing
